services:
  postgres:
    image: postgres:14
    container_name: can0n-postgres
    environment:
      POSTGRES_DB: can0n_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
